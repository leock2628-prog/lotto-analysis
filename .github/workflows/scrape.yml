name: 🎰 抓取大樂透最新開獎資料

on:
  schedule:
    - cron: '30 13 * * 2'
    - cron: '30 13 * * 5'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install dependencies
        working-directory: scripts
        run: npm install

      - name: 🎭 Install Playwright
        working-directory: scripts
        run: npx playwright install chromium --with-deps

      - name: 🕷️ Run scraper
        working-directory: scripts
        run: node scrape.js
        timeout-minutes: 5

      - name: 📝 Commit draws.json
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add draws.json
          if git diff --staged --quiet; then
            echo "無新資料，跳過 commit"
          else
            LATEST=$(node -e "const d=require('./draws.json'); console.log(d.draws[0].period + ' ' + d.draws[0].date)")
            git commit -m "🎰 自動更新：${LATEST}"
            git push
          fi
